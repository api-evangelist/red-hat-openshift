naftiko: "1.0.0-alpha1"

info:
  label: "Red Hat OpenShift Container Platform API"
  description: "OpenShift Container Platform REST API for managing projects, routes, builds, image streams, deployment configs, and security context constraints."
  tags:
    - Containers
    - Kubernetes
    - OpenShift
    - Red Hat
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      OPENSHIFT_API_TOKEN: OPENSHIFT_API_TOKEN
      OPENSHIFT_API_URL: OPENSHIFT_API_URL

capability:
  consumes:
    - type: http
      namespace: openshift-api
      baseUri: "{{OPENSHIFT_API_URL}}"
      description: "OpenShift Container Platform REST API"
      authentication:
        type: bearer
        token: "{{OPENSHIFT_API_TOKEN}}"
      resources:
        - name: projects
          path: /apis/project.openshift.io/v1/projects
          description: "OpenShift project management"
          operations:
            - name: list-projects
              method: GET
              description: "List OpenShift projects accessible to the current user"
              inputParameters:
                - name: labelSelector
                  in: query
                  type: string
                  required: false
                  description: "Label selector to filter projects"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of projects to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-project
              method: POST
              description: "Create a new OpenShift project"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "project.openshift.io/v1"
                  kind: "Project"
                  metadata:
                    name: "{{tools.project_name}}"
        - name: project
          path: /apis/project.openshift.io/v1/projects/{name}
          description: "Individual OpenShift project"
          operations:
            - name: get-project
              method: GET
              description: "Get OpenShift project details"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Project name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-project
              method: DELETE
              description: "Delete an OpenShift project"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Project name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: routes
          path: /apis/route.openshift.io/v1/namespaces/{namespace}/routes
          description: "OpenShift route management"
          operations:
            - name: list-routes
              method: GET
              description: "List routes in a namespace"
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "Namespace to list routes in"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-route
              method: POST
              description: "Create a new route to expose a service"
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "Namespace to create route in"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "route.openshift.io/v1"
                  kind: "Route"
                  metadata:
                    name: "{{tools.route_name}}"
                    namespace: "{{tools.namespace}}"
        - name: builds
          path: /apis/build.openshift.io/v1/namespaces/{namespace}/builds
          description: "OpenShift build management"
          operations:
            - name: list-builds
              method: GET
              description: "List builds in a namespace"
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "Namespace to list builds in"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: openshift-api-rest
      resources:
        - path: /v1/projects
          name: projects
          description: "OpenShift project listing and creation"
          operations:
            - method: GET
              name: list-projects
              description: "List OpenShift projects"
              call: "openshift-api.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-project
              description: "Create an OpenShift project"
              call: "openshift-api.create-project"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: openshift-api-mcp
      transport: http
      tools:
        - name: list-openshift-projects
          description: "List OpenShift projects the current user has access to"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-api.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-openshift-project
          description: "Create a new OpenShift project (namespace)"
          hints:
            readOnly: false
            openWorld: false
          call: "openshift-api.create-project"
          with:
            project_name: "tools.project_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-routes
          description: "List HTTP routes in an OpenShift namespace"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-api.list-routes"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-builds
          description: "List builds in an OpenShift namespace"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-api.list-builds"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
