naftiko: "1.0.0-alpha1"

info:
  label: "Red Hat OpenShift Cluster Manager API"
  description: "Manages OpenShift clusters via the Red Hat Hybrid Cloud Console OCM API. Supports creating, configuring, and monitoring clusters across cloud providers."
  tags:
    - Cloud
    - Cluster Management
    - OpenShift
    - Red Hat
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      OCM_API_TOKEN: OCM_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: openshift-cluster-mgr
      baseUri: https://api.openshift.com
      description: "OpenShift Cluster Manager API via Red Hat Hybrid Cloud Console"
      authentication:
        type: bearer
        token: "{{OCM_API_TOKEN}}"
      resources:
        - name: clusters
          path: /api/clusters_mgmt/v1/clusters
          description: "OpenShift cluster lifecycle management"
          operations:
            - name: list-clusters
              method: GET
              description: "List all OpenShift clusters"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "SQL-like search filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-cluster
              method: POST
              description: "Create a new OpenShift cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.cluster_name}}"
                  cloud_provider:
                    id: "{{tools.cloud_provider}}"
                  region:
                    id: "{{tools.region}}"
        - name: cluster
          path: /api/clusters_mgmt/v1/clusters/{cluster_id}
          description: "Individual cluster management"
          operations:
            - name: get-cluster
              method: GET
              description: "Get cluster details and status"
              inputParameters:
                - name: cluster_id
                  in: path
                  type: string
                  required: true
                  description: "Cluster ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-cluster
              method: DELETE
              description: "Delete an OpenShift cluster"
              inputParameters:
                - name: cluster_id
                  in: path
                  type: string
                  required: true
                  description: "Cluster ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: addons
          path: /api/clusters_mgmt/v1/clusters/{cluster_id}/addons
          description: "Cluster add-on management"
          operations:
            - name: list-addons
              method: GET
              description: "List installed add-ons for a cluster"
              inputParameters:
                - name: cluster_id
                  in: path
                  type: string
                  required: true
                  description: "Cluster ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: machine-pools
          path: /api/clusters_mgmt/v1/clusters/{cluster_id}/machine_pools
          description: "Cluster machine pool management"
          operations:
            - name: list-machine-pools
              method: GET
              description: "List machine pools for a cluster"
              inputParameters:
                - name: cluster_id
                  in: path
                  type: string
                  required: true
                  description: "Cluster ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: versions
          path: /api/clusters_mgmt/v1/versions
          description: "Available OpenShift versions"
          operations:
            - name: list-versions
              method: GET
              description: "List available OpenShift versions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: openshift-cluster-mgr-rest
      resources:
        - path: /v1/clusters
          name: clusters
          description: "OpenShift cluster listing and creation"
          operations:
            - method: GET
              name: list-clusters
              description: "List OpenShift clusters"
              call: "openshift-cluster-mgr.list-clusters"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: openshift-cluster-mgr-mcp
      transport: http
      tools:
        - name: list-clusters
          description: "List all managed OpenShift clusters"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-cluster-mgr.list-clusters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cluster
          description: "Get details and status of a specific OpenShift cluster"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-cluster-mgr.get-cluster"
          with:
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cluster-addons
          description: "List add-ons installed on a cluster"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-cluster-mgr.list-addons"
          with:
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-machine-pools
          description: "List machine pools (node groups) for a cluster"
          hints:
            readOnly: true
            openWorld: true
          call: "openshift-cluster-mgr.list-machine-pools"
          with:
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
