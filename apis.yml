aid: red-hat-openshift
name: Red Hat OpenShift
description: >-
  Red Hat OpenShift is an enterprise Kubernetes platform that provides a
  consistent foundation for building, deploying, and scaling containerized
  applications across hybrid and multi-cloud environments. It includes
  developer tools, built-in CI/CD, monitoring, and automated operations to
  streamline the full application lifecycle.
