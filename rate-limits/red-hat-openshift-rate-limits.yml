specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Red Hat OpenShift
providerId: red-hat-openshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Kubernetes
  - Containers
  - Cloud
  - Rate Limiting
description: OpenShift's user-facing surfaces (Kubernetes API, oc CLI, console) inherit upstream
  Kubernetes APIServer flow control rather than enforcing a Red Hat-published rate ceiling. The
  managed cloud services (ROSA, ARO, OpenShift Dedicated, OpenShift on IBM Cloud) carry SLAs
  of 99.95–99.99% but no public per-second request ceiling.
sources:
  - https://www.redhat.com/en/technologies/cloud-computing/openshift/pricing
notes: OpenShift inherits Kubernetes APIServer Priority and Fairness throttling; Red Hat does
  not publish a single rate-limit value.
responseCodes:
  throttled: 429
limits:
  - name: Kubernetes APIServer flow control
    scope: account
    metric: varies
    limit: 'governed by Kubernetes APIServer Priority and Fairness; no Red Hat-published ceiling'
  - name: Managed-service SLA (ROSA / ARO / Dedicated / IBM)
    scope: cluster
    metric: varies
    limit: '99.95-99.99% uptime SLA per managed service tier'
policies:
  - name: APIServer Priority and Fairness
    description: OpenShift inherits Kubernetes APF, which prioritizes essential controllers
      and throttles excessive client traffic with 429 responses; consumers should honor Retry-After
      and use informers/watch instead of polling.
  - name: SLA-backed Availability
    description: Managed OpenShift services target 99.95-99.99% monthly uptime; cluster-control-plane
      throttling and resilience are managed by Red Hat / cloud provider, not the customer.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
