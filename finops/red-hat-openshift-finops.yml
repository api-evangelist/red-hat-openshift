specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Red Hat OpenShift
providerId: red-hat-openshift
publisherName: Red Hat, Inc.
serviceCategory: Container Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Kubernetes
  - Containers
  - Cloud
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Red Hat OpenShift. Two billing surfaces coexist —
  managed cloud services billed hourly through the cloud provider's invoice (AWS, Azure, IBM,
  GCP) with reserved-instance / committed-use discount, and self-managed annual subscriptions
  billed by Red Hat. Reserved-instance ROSA at 4vCPU/3yr starts at $0.076/hour.
sources:
  - https://www.redhat.com/en/technologies/cloud-computing/openshift/pricing
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Red Hat OpenShift
  ServiceCategory: Container Platform
  ProviderName: Red Hat
  PublisherName: Red Hat, Inc.
  InvoiceIssuerName: 'Red Hat, Inc. (self-managed); cloud provider (managed services)'
  BillingCurrency: USD
meters:
  - name: rosa_instance_hours
    description: Hourly billed Red Hat OpenShift Service on AWS instance hours; on-demand or
      reserved (1yr / 3yr).
    unit: instance-hour
    aggregation: sum
    dimensions:
      - aws_region
      - instance_type
      - commitment_term
  - name: aro_instance_hours
    description: Hourly billed Microsoft Azure Red Hat OpenShift instance hours.
    unit: instance-hour
    aggregation: sum
    dimensions:
      - azure_region
      - instance_type
  - name: dedicated_subscription
    description: Annual Red Hat OpenShift Dedicated subscription on AWS or Google Cloud.
    unit: contract
    aggregation: sum
    dimensions:
      - underlying_cloud
      - support_level
  - name: ibm_instance_hours
    description: Hourly billed Red Hat OpenShift on IBM Cloud instance hours.
    unit: instance-hour
    aggregation: sum
    dimensions:
      - ibm_region
      - instance_type
  - name: self_managed_subscription
    description: Annual self-managed OpenShift subscription (Platform Plus, Container Platform,
      Kubernetes Engine, Virtualization Engine).
    unit: contract
    aggregation: sum
    dimensions:
      - edition
      - core_count
      - support_level
principles:
  - name: Visibility
    description: For managed services, ingest the cloud provider's CUR/billing export (AWS CUR,
      Azure Cost Mgmt, IBM Cloud billing) filtered to the OpenShift line items. For self-managed,
      use Red Hat Subscription Watch and OpenShift Cost Management Operator to attribute cluster
      spend to namespaces.
  - name: Allocation
    description: Tag clusters and namespaces; use the OpenShift Cost Management Operator to
      attribute compute, memory, and storage to teams and projects.
  - name: Optimization
    description: Move steady-state ROSA workloads to reserved instances ($0.076/hr at 4vCPU
      3yr starting rate); consolidate self-managed editions onto Platform Plus where ACM/ACS
      are needed; right-size cluster autoscaler aggressively in non-prod.
  - name: Accountability
    description: Platform team owns cluster-level spend; product teams own namespace-level
      consumption attributed via Cost Management Operator.
maintainers:
