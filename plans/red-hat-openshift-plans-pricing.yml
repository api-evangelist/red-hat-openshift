specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Red Hat OpenShift
providerId: red-hat-openshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Kubernetes
  - Containers
  - Cloud
  - Platform
description: Red Hat OpenShift is sold in two shapes — managed cloud services (billed hourly,
  with reserved-instance discounts) and self-managed editions (annual subscription priced by
  sizing). The pricing page publishes a "starting at $0.076/hour" reserved-instance rate for
  managed OpenShift on AWS at 4vCPU with a 3-year commitment; self-managed edition list prices
  are quoted by sales.
sources:
  - https://www.redhat.com/en/technologies/cloud-computing/openshift/pricing
plans:
  - id: red-hat-openshift-rosa-reserved
    name: Red Hat OpenShift on AWS — Reserved
    type: usage-based
    description: Managed OpenShift on AWS, billed via AWS, with reserved-instance discounting
      for term commitments. 99.95–99.99% uptime SLA.
    entries:
      - label: Reserved instance (4vCPU, 3-year)
        name: rosa_reserved_4vcpu_3y
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: starting at $0.076/hour
        userMultiplied: false
    elements:
      - name: Red Hat + AWS jointly managed
      - name: AWS billing relationship
      - name: Includes monitoring, logging, CI/CD, API Management
  - id: red-hat-openshift-aro
    name: Microsoft Azure Red Hat OpenShift
    type: usage-based
    description: Managed OpenShift on Azure, billed via Azure, jointly managed by Red Hat and
      Microsoft. Pricing varies by node sizing; see Azure marketplace for current rates.
    entries:
      - label: Azure marketplace metered
        name: aro_hourly
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see Azure marketplace
        userMultiplied: false
    elements:
      - name: Azure billing relationship
      - name: Red Hat + Microsoft jointly managed
  - id: red-hat-openshift-dedicated
    name: Red Hat OpenShift Dedicated
    type: subscription
    description: Red Hat-managed OpenShift on AWS or Google Cloud; commercial terms quoted by
      sales.
    entries:
      - label: Custom subscription
        name: dedicated_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Red Hat managed
      - name: AWS or Google Cloud underlay
  - id: red-hat-openshift-ibm
    name: Red Hat OpenShift on IBM Cloud
    type: usage-based
    description: IBM-managed OpenShift on IBM Cloud, supported by Red Hat. Pricing on IBM Cloud.
    entries:
      - label: IBM Cloud metered
        name: ibm_hourly
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see IBM Cloud pricing
        userMultiplied: false
    elements:
      - name: IBM managed, Red Hat supported
  - id: red-hat-openshift-platform-plus
    name: Red Hat OpenShift Platform Plus (self-managed)
    type: subscription
    description: Most comprehensive self-managed edition. Includes Advanced Cluster Management,
      Advanced Cluster Security, Data Foundation, and Quay. Pricing varies by sizing.
    entries:
      - label: Annual subscription
        name: platform_plus_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Advanced Cluster Management
      - name: Advanced Cluster Security
      - name: OpenShift Data Foundation
      - name: Quay
  - id: red-hat-openshift-container-platform
    name: Red Hat OpenShift Container Platform (self-managed)
    type: subscription
    description: Mid-level self-managed edition with developer console, Serverless, Service Mesh,
      Pipelines, GitOps. Pricing varies by sizing.
    entries:
      - label: Annual subscription
        name: ocp_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Developer console
      - name: OpenShift Serverless
      - name: Service Mesh
      - name: Pipelines and GitOps
  - id: red-hat-openshift-kubernetes-engine
    name: Red Hat OpenShift Kubernetes Engine (self-managed)
    type: subscription
    description: Entry-level self-managed edition for containers on enterprise Kubernetes.
    entries:
      - label: Annual subscription
        name: kubernetes_engine_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Enterprise Kubernetes runtime
  - id: red-hat-openshift-virtualization-engine
    name: Red Hat OpenShift Virtualization Engine (self-managed)
    type: subscription
    description: Entry-level self-managed edition optimized for VM-only workloads.
    entries:
      - label: Annual subscription
        name: virtualization_engine_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: VM-only workload runtime
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
